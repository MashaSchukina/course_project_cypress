version: 2.1

jobs:
  node-job:
    docker:
      - image: cypress/base:24.17.0

    steps:
      - checkout

      - run:
          name: Install dependencies
          command: |
            apt-get update
            apt-get install -y unzip default-jdk

      - run:
          name: Install npm packages
          command: npm ci

      - run:
          name: Run tests
          command: npm run test

      - run:
          name: Generate Allure report
          command: npm run allure:report

      - store_artifacts:
          path: allure-report
          destination: CypressReport

      - store_test_results:
          path: allure-results

workflows:
  build-and-test:
    jobs:
      - node-job
