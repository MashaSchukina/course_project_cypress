version: 2.1

jobs:
  e2e-tests:
    docker:
      - image: cypress/base:24.17.0

    steps:
      - checkout

      - run:
          name: Install npm packages
          command: npm ci

      - run:
          name: Run tests
          command: npm run test

      - store_artifacts:
          path: cypress/reports
          destination: cypress-mochawesome-reports

      - store_artifacts:
          path: cypress/screenshots
          destination: cypress-screenshots

      - store_artifacts:
          path: cypress/videos
          destination: cypress-videos

workflows:
  test-pipeline:
    jobs:
      - e2e-tests
